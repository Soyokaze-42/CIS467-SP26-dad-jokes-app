name: Publish Container Image

on:
  workflow_call:
   inputs:
     new_release_version:
       required: true
       type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish_container_image:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [frontend, api]
    #permissions are in the calling workflow
    steps:
      - name: Setup | Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.new_release_version }}

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/dad-jokes-${{ matrix.image }}
          tags: |
           type=semver,pattern={{raw}},value=${{ inputs.new_release_version }}
           type=raw,value=latest

      - name: Action | Build and push app container image
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.image }}
          file: ./${{ matrix.image }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}